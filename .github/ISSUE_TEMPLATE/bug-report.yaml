name: Bug Report
description: Create a bug report to help improve Spegel
type: bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to fill ot this bug report! Please check previous issues and discussions before submitting a new issue.
  - type: input
    attributes:
      label: Spegel version
      placeholder: eg. v0.7.0
    validations:
      required: true
  - type: input
    attributes:
      label: Kubernetes distribution
      placeholder: eg. AKS, EKS, K3S, Kubeadm...
    validations:
      required: false
  - type: input
    attributes:
      label: Kubernetes version
      placeholder: eg. v1.36.0
    validations:
      required: false
  - type: input
    attributes:
      label: CNI
      placeholder: eg. Calico, Cilium, Azure CNI...
    validations:
      required: false
  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Community Rules
      description: The [Code of Conduct](github.com/spegel-org/.github/blob/main/CODE_OF_CONDUCT.md) and [AI Policy](../../AI_POLICY.md) helps create a healthy community. We require that everyone agrees to it.
      options:
        - label: I agree to follow Spegels community rules and that all my communication is written by a human.
          required: true
