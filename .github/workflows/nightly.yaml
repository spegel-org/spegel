name: nightly
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
permissions:
  contents: read
defaults:
  run:
    shell: bash
jobs:
  integration-containerd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c #v6.4.0
        with:
          go-version-file: ./test/integration/containerd/go.mod
          cache-dependency-path: ./test/integration/containerd/go.sum
      - name: Run tests
        run: INTEGRATION_TEST_STRATEGY="all" go test -race -count 1 -failfast ./...
        working-directory: ./test/integration/containerd
  integration-kubernetes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c #v6.4.0
        with:
          go-version-file: ./test/integration/kubernetes/go.mod
          cache-dependency-path: ./test/integration/kubernetes/go.sum
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 #v7.2.2
        with:
          install-only: true
      - name: Build image
        id: build
        run: |
          IMG_REF=$(make build-image)
          echo "IMG_REF=${IMG_REF}" >> $GITHUB_OUTPUT
      - name: Run tests
        run: INTEGRATION_TEST_STRATEGY="all" IMG_REF=${{ steps.build.outputs.IMG_REF }} go test -timeout 60m -race -count 1 -failfast ./...
        working-directory: ./test/integration/kubernetes
