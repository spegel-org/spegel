name: changelog
on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]
permissions:
  contents: read
defaults:
  run:
    shell: bash   
jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check changelog label
        uses: mheap/github-action-required-labels@0ac283b4e65c1fb28ce6079dea5546ceca98ccbe #v5.5.2
        with:
          mode: exactly
          count: 1
          use_regex: true
          labels: "changelog/*"
